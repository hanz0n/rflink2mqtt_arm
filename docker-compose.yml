version: '3.3'

services:
  rflink2mqtt:
    image: rflink2mqtt-arm:latest
    container_name: rflink2mqtt
    hostname: rflink2mqtt
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"
    # - "/dev/serial/by-id/usb-Arduino__www.arduino.cc__0042_85635303433351F050A1-if00:/dev/ttyACM0" # ls -l /dev/serial/by-id/
    environment:
      - "MQTT_SERVER=mosquitto"
      - "MQTT_PORT=1883"
      - "USB_INTERFACE=/dev/ttyACM0"
    restart: always
    network_mode: host
